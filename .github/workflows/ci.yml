name: CI/CD

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov flake8

    - name: Lint with flake8
      run: |
        flake8 backend/ tests/ --max-line-length=200 --exclude=__pycache__,.git --ignore=E302,E305,E306,E127,E226,E401,E402,E501,E701,E702,W503,F401

    - name: Test with pytest
      run: |
        python -m pytest tests/ -v --cov=backend --cov-report=term --cov-report=xml --junitxml=junit.xml -x

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

    - name: Test Summary
      if: always()
      run: |
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        python -m pytest tests/ --tb=short -q 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create release archive
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        mkdir -p dist/omarchy-control-$VERSION
        cp -r backend frontend bin install.sh README.md LICENSE dist/omarchy-control-$VERSION/
        cd dist
        tar czf omarchy-control-$VERSION.tar.gz omarchy-control-$VERSION/
        zip -r omarchy-control-$VERSION.zip omarchy-control-$VERSION/

    - name: Generate checksums
      run: |
        cd dist
        sha256sum *.tar.gz *.zip > checksums.txt
        cat checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        body: |
          ## Omarchy Control ${{ github.ref_name }}

          ### Features
          - Real-time system monitoring with SSE streaming
          - Live CPU, memory, disk gauges with sparkline charts
          - Process explorer with kill capability
          - Systemd journal log viewer with search and follow mode
          - Network and disk I/O throughput monitoring
          - System health score with configurable alert thresholds
          - Temperature monitoring
          - Dark/light theme toggle
          - All existing features preserved

          ### Installation
          ```bash
          git clone https://github.com/irfancode/omarchy-control.git
          cd omarchy-control
          ./install.sh
          omarchy-control
          ```

          ### SHA256 Checksums
          See checksums.txt in the release assets.
        files: |
          dist/*.tar.gz
          dist/*.zip
        fail_on_unmatched_files: true
